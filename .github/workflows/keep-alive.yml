name: Render Keep-Alive

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_URL: https://commitdiary-backend.onrender.com
      STEPPER_URL: ${{ secrets.RENDER_APP_URL }}
    steps:
      - name: Ping API and Stepper health endpoints
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${STEPPER_URL}" ]]; then
            echo "RENDER_APP_URL is not configured."
            exit 1
          fi

          ping_service() {
            local name="$1"
            local base_url="${2%/}"
            echo "Pinging ${name}..."
            curl \
              --fail \
              --show-error \
              --silent \
              --max-time 60 \
              --retry 2 \
              --retry-delay 5 \
              "${base_url}/health" > /dev/null
          }

          ping_service "CommitDiary API" "${API_URL}"
          ping_service "CommitDiary Stepper" "${STEPPER_URL}"
